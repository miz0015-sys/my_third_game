<!DOCTYPE html>
<html>
<head>
  <title>My Fourth Map</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    canvas {
      border: 2px solid red;
      background: #f0f0f0;
      margin-top: 20px;
    }
  </style>
</head>

  <body>

<button onclick="location.href='https://miz0015-sys.github.io/my-map/'"
style="position:absolute; top:10px; left:10px;">
⬅ To my first map
</button>
    
<h2>Use Arrow Keys to Move</h2>
<canvas id="game" width="500" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player (circle)
let player = {
  x: 50,
  y: 50,
  size: 20,
  speed: 3
};

// Obstacle (rectangle)
let obstacle = {
  x: 200,
  y: 150,
  width: 120,
  height: 60
};

// Track keys
let keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

// Check collision
function isColliding(x, y) {
  return (
    x < obstacle.x + obstacle.width &&
    x + player.size > obstacle.x &&
    y < obstacle.y + obstacle.height &&
    y + player.size > obstacle.y
  );
}

function update() {
  let newX = player.x;
  let newY = player.y;

  if (keys["ArrowUp"]) newY -= player.speed;
  if (keys["ArrowDown"]) newY += player.speed;
  if (keys["ArrowLeft"]) newX -= player.speed;
  if (keys["ArrowRight"]) newX += player.speed;

  // Boundary limits
  if (newX < 0) newX = 0;
  if (newY < 0) newY = 0;
  if (newX + player.size > canvas.width)
    newX = canvas.width - player.size;
  if (newY + player.size > canvas.height)
    newY = canvas.height - player.size;

  // Block obstacle
  if (!isColliding(newX, newY)) {
    player.x = newX;
    player.y = newY;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw player (circle)
  ctx.beginPath();
  ctx.arc(player.x + 10, player.y + 10, 10, 0, Math.PI * 2);
  ctx.fillStyle = "blue";
  ctx.fill();

  // Draw obstacle
  ctx.fillStyle = "red";
  ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
